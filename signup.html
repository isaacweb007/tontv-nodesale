<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회원가입 | TonTV</title>
<meta name="description" content="톤티비 노드 사업자 회원가입.">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="icon" href="favicon.ico" sizes="32x32">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#0e0f12">
</head>
<body data-page="signup">

<main class="auth-wrap">
  <div class="auth-card">
    <a class="auth-brand" href="index.html" aria-label="TonTV 홈">
      <svg class="brand-mark" viewBox="0 0 44 44" aria-hidden="true"><rect x="3" y="3" width="38" height="38" rx="12" fill="#E8112D"/><path d="M17.5 13.8 31 21.4a.7.7 0 0 1 0 1.2L17.5 30.2a.7.7 0 0 1-1.05-.6V14.4a.7.7 0 0 1 1.05-.6Z" fill="#fff"/></svg>
      <span class="w">Ton<span class="tv">TV</span></span>
    </a>
    <h1 class="auth-title">회원가입</h1>
    <p class="auth-sub">노드 사업자 계정을 만들고 바로 시작하세요.</p>

    <div class="auth-msg" id="msg" role="status"></div>

    <form id="auth-form" novalidate>
      <div class="field">
        <label for="name">이름 <span class="req">*</span></label>
        <input class="inp" type="text" id="name" autocomplete="name" placeholder="홍길동" required>
      </div>
      <div class="field">
        <label for="contact">연락처</label>
        <input class="inp" type="text" id="contact" placeholder="텔레그램 · 카카오톡 ID 등">
        <div class="hint">선택 — 텔레그램/카톡 등 연락 수단</div>
      </div>
      <div class="field">
        <label for="email">이메일 <span class="req">*</span></label>
        <input class="inp" type="email" id="email" autocomplete="email" placeholder="you@example.com" required>
      </div>
      <div class="field">
        <label for="password">비밀번호 <span class="req">*</span></label>
        <input class="inp" type="password" id="password" autocomplete="new-password" placeholder="6자 이상" minlength="6" required>
        <div class="hint">6자 이상 입력하세요.</div>
      </div>
      <div class="field">
        <label for="phone">핸드폰번호 <span class="req">*</span></label>
        <input class="inp" type="tel" id="phone" autocomplete="tel" placeholder="010-1234-5678" required>
      </div>
      <div class="field">
        <label for="ref">추천인 코드</label>
        <input class="inp" type="text" id="ref" placeholder="TONTV-XXXXXX (선택)">
        <div class="hint">선택 — 추천인의 코드가 있다면 입력하세요.</div>
      </div>
      <button class="btn btn-red btn-block btn-lg" id="submit" type="submit">가입하고 시작하기 →</button>
    </form>

    <p class="auth-foot">이미 계정이 있으신가요? <a href="login.html">로그인</a></p>
    <a class="auth-back" href="index.html">← 홈으로 돌아가기</a>
  </div>
</main>

<script type="module">
  import { signUpOperator, getSession } from './lib/supabase.js';
  const $ = (s) => document.querySelector(s);
  const show = (t, type) => { const m = $('#msg'); m.textContent = t; m.className = 'auth-msg show ' + type; };

  getSession().then((s) => { if (s) location.replace('myoffice.html'); }).catch(() => {});

  $('#auth-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = $('#name').value.trim();
    const email = $('#email').value.trim();
    const password = $('#password').value;
    const phone = $('#phone').value.trim();
    const contact = $('#contact').value.trim();
    const referralCode = $('#ref').value.trim();

    if (!name || !email || !password || !phone) { show('필수 항목(이름·이메일·비밀번호·핸드폰번호)을 입력하세요.', 'err'); return; }
    if (password.length < 6) { show('비밀번호는 6자 이상이어야 합니다.', 'err'); return; }

    const btn = $('#submit'); const orig = btn.textContent;
    btn.disabled = true; btn.textContent = '가입 중…';
    try {
      await signUpOperator({ name, contact, email, password, phone, referralCode });
      show('가입 완료! 대시보드로 이동합니다…', 'ok');
      location.href = 'myoffice.html';
    } catch (err) {
      show(translateErr(err), 'err');
      btn.disabled = false; btn.textContent = orig;
    }
  });

  function translateErr(err) {
    const m = (err && err.message || '').toLowerCase();
    if (m.includes('already registered') || m.includes('already exists') || m.includes('user already')) return '이미 가입된 이메일입니다. 로그인해 주세요.';
    if (m.includes('password')) return '비밀번호가 조건을 충족하지 않습니다 (6자 이상).';
    if (m.includes('invalid') && m.includes('email')) return '올바른 이메일 형식이 아닙니다.';
    return '오류: ' + (err && err.message || String(err));
  }
</script>
</body>
</html>
