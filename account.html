<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 계정 — 프로필 · 보안 | TonTV</title>
<meta name="description" content="톤티비 노드 사업자 내 계정 — 프로필, 추천 코드, 비밀번호 변경.">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="icon" href="favicon.ico" sizes="32x32">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#101113">
</head>
<body data-page="account">

<section class="dash" id="account" style="padding-top:108px">
  <div class="wrap">
    <div class="crumb" style="font-size:12.5px;color:#8a909b;margin-bottom:16px;display:flex;gap:9px;align-items:center">
      <a href="index.html" style="color:#8a909b">홈</a><span style="opacity:.4">/</span><span style="color:#cfd2d8">내 계정</span>
    </div>
    <div class="sec-head" style="margin-bottom:28px">
      <span class="eyebrow">내 계정</span>
      <h2>프로필 · <span class="r">보안</span></h2>
      <p>계정 정보와 추천 코드를 확인하고, 비밀번호를 변경할 수 있습니다.</p>
    </div>

    <div class="acct-grid">
      <!-- 프로필 -->
      <div class="dash-card">
        <div class="ch"><h3><span class="em"><svg class="icon"><use href="#i-user"/></svg></span> 프로필</h3><span class="tagx" id="acct-kyc">—</span></div>
        <div class="acct-rows">
          <div class="ar"><span class="k">이름</span><span class="v" id="p-name">—</span></div>
          <div class="ar"><span class="k">이메일</span><span class="v" id="p-email">—</span></div>
          <div class="ar"><span class="k">핸드폰번호</span><span class="v" id="p-phone">—</span></div>
          <div class="ar"><span class="k">연락처</span><span class="v" id="p-contact">—</span></div>
        </div>
        <div class="acct-ref">
          <div class="arl">내 추천 코드</div>
          <div class="arc"><span id="p-refcode">—</span><button class="cp" id="copy-refcode">복사</button></div>
          <div class="arc ghost"><span id="p-reflink">—</span><button class="cp" id="copy-reflink">링크</button></div>
        </div>
        <button class="btn btn-dark btn-block" id="acct-logout" style="margin-top:18px"><svg class="icon"><use href="#i-arrow-ur"/></svg> 로그아웃</button>
      </div>

      <!-- 비밀번호 변경 -->
      <div class="dash-card">
        <div class="ch"><h3><span class="em"><svg class="icon"><use href="#i-lock"/></svg></span> 비밀번호 변경</h3></div>
        <div class="auth-msg" id="pw-msg" role="status"></div>
        <form id="pw-form" novalidate>
          <div class="field">
            <label for="cur-pw">현재 비밀번호</label>
            <input class="inp" type="password" id="cur-pw" autocomplete="current-password" placeholder="현재 비밀번호">
          </div>
          <div class="field">
            <label for="new-pw">새 비밀번호</label>
            <input class="inp" type="password" id="new-pw" autocomplete="new-password" placeholder="6자 이상" minlength="6">
          </div>
          <div class="field">
            <label for="new-pw2">새 비밀번호 확인</label>
            <input class="inp" type="password" id="new-pw2" autocomplete="new-password" placeholder="새 비밀번호 재입력">
          </div>
          <button class="btn btn-red btn-block" id="pw-btn" type="submit">비밀번호 변경</button>
        </form>
        <p style="font-size:11.5px;color:#7f858f;margin-top:14px;line-height:1.5"><svg class="icon" style="vertical-align:-.15em;color:var(--red-2)"><use href="#i-shield"/></svg> 변경 시 현재 비밀번호로 본인 확인 후 적용됩니다.</p>
      </div>
    </div>
  </div>
</section>

<script src="layout.js"></script>
<script type="module">
(() => {
  const $ = (s) => document.querySelector(s);
  const KYC = { none: '미인증', pending: '심사 중', verified: '인증 완료', rejected: '반려' };

  import('./lib/supabase.js').then(async (m) => {
    const session = await m.getSession().catch(() => null);
    if (!session) { location.replace('login.html'); return; }

    // 프로필 로드
    try {
      const p = await m.getMyProfile();
      if (p) {
        $('#p-name').textContent = p.display_name || '—';
        $('#p-email').textContent = p.email || '—';
        $('#p-phone').textContent = p.phone || '—';
        $('#p-contact').textContent = p.contact || '—';
        $('#acct-kyc').textContent = KYC[p.kyc_status] || p.kyc_status || '—';
        if (p.referral_code) {
          $('#p-refcode').textContent = p.referral_code;
          $('#p-reflink').textContent = 'https://tontv.tonyai.cc/?ref=' + p.referral_code;
        }
      }
    } catch (e) {}

    // 복사
    const copy = async (text, okmsg) => {
      try { await navigator.clipboard.writeText(text); window.toast && window.toast(okmsg); } catch (_) {}
    };
    $('#copy-refcode').addEventListener('click', () => copy($('#p-refcode').textContent, '추천 코드가 복사되었습니다'));
    $('#copy-reflink').addEventListener('click', () => copy($('#p-reflink').textContent, '추천 링크가 복사되었습니다'));

    // 로그아웃
    $('#acct-logout').addEventListener('click', async () => {
      try { await m.signOut(); } catch (_) {}
      location.href = 'index.html';
    });

    // 비밀번호 변경
    const msg = (t, type) => { const e = $('#pw-msg'); e.textContent = t; e.className = 'auth-msg show ' + type; };
    $('#pw-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const cur = $('#cur-pw').value, n1 = $('#new-pw').value, n2 = $('#new-pw2').value;
      if (!cur || !n1) { msg('현재 비밀번호와 새 비밀번호를 입력하세요.', 'err'); return; }
      if (n1.length < 6) { msg('새 비밀번호는 6자 이상이어야 합니다.', 'err'); return; }
      if (n1 !== n2) { msg('새 비밀번호가 일치하지 않습니다.', 'err'); return; }
      const btn = $('#pw-btn'); const orig = btn.textContent;
      btn.disabled = true; btn.textContent = '변경 중…';
      try {
        await m.changePassword({ currentPassword: cur, newPassword: n1 });
        msg('비밀번호가 변경되었습니다.', 'ok');
        $('#pw-form').reset();
      } catch (err) {
        msg(String(err && err.message || err), 'err');
      } finally {
        btn.disabled = false; btn.textContent = orig;
      }
    });
  }).catch(() => { location.replace('login.html'); });
})();
</script>
</body>
</html>
