<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 | TonTV</title>
<meta name="description" content="톤티비 노드 사업자 로그인.">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="icon" href="favicon.ico" sizes="32x32">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#0e0f12">
</head>
<body data-page="login">

<main class="auth-wrap">
  <div class="auth-card">
    <a class="auth-brand" href="index.html" aria-label="TonTV 홈">
      <svg class="brand-mark" viewBox="0 0 44 44" aria-hidden="true"><rect x="3" y="3" width="38" height="38" rx="12" fill="#E8112D"/><path d="M17.5 13.8 31 21.4a.7.7 0 0 1 0 1.2L17.5 30.2a.7.7 0 0 1-1.05-.6V14.4a.7.7 0 0 1 1.05-.6Z" fill="#fff"/></svg>
      <span class="w">Ton<span class="tv">TV</span></span>
    </a>
    <h1 class="auth-title">로그인</h1>
    <p class="auth-sub">노드 사업자 계정으로 로그인하세요.</p>

    <div class="auth-msg" id="msg" role="status"></div>

    <form id="auth-form" novalidate>
      <div class="field">
        <label for="email">이메일</label>
        <input class="inp" type="email" id="email" autocomplete="email" placeholder="you@example.com" required>
      </div>
      <div class="field">
        <label for="password">비밀번호</label>
        <input class="inp" type="password" id="password" autocomplete="current-password" placeholder="비밀번호" required>
      </div>
      <button class="btn btn-red btn-block btn-lg" id="submit" type="submit">로그인</button>
    </form>

    <p class="auth-foot">계정이 없으신가요? <a href="signup.html">회원가입</a></p>
    <a class="auth-back" href="index.html">← 홈으로 돌아가기</a>
  </div>
</main>

<script type="module">
  import { signIn, getSession } from './lib/supabase.js';
  const $ = (s) => document.querySelector(s);
  const show = (t, type) => { const m = $('#msg'); m.textContent = t; m.className = 'auth-msg show ' + type; };

  // 이미 로그인돼 있으면 대시보드로
  getSession().then((s) => { if (s) location.replace('myoffice.html'); }).catch(() => {});

  $('#auth-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = $('#email').value.trim();
    const password = $('#password').value;
    if (!email || !password) { show('이메일과 비밀번호를 입력하세요.', 'err'); return; }
    const btn = $('#submit'); const orig = btn.textContent;
    btn.disabled = true; btn.textContent = '로그인 중…';
    try {
      await signIn({ email, password });
      show('로그인 성공! 대시보드로 이동합니다…', 'ok');
      location.href = 'myoffice.html';
    } catch (err) {
      show(translateErr(err), 'err');
      btn.disabled = false; btn.textContent = orig;
    }
  });

  function translateErr(err) {
    const m = (err && err.message || '').toLowerCase();
    if (m.includes('invalid login') || m.includes('invalid credentials')) return '이메일 또는 비밀번호가 올바르지 않습니다.';
    if (m.includes('email not confirmed')) return '이메일 확인이 필요합니다.';
    return '오류: ' + (err && err.message || String(err));
  }
</script>
</body>
</html>
